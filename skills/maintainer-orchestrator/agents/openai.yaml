interface:
  display_name: "Maintainer Orchestrator"
  short_description: "Delegate repo work and prepare mergeable queues"
  default_prompt: "Use $maintainer-orchestrator as the only thread-topology owner for Ossian-majority repositories. Create and steer repository workers directly (Codex: forbid workers from subdelegating; Claude Code: subagents may spawn their own subagents). Rename each assigned worker as Project: short current task, monitor via completion notifications plus a heartbeat backstop, maintain ~/oss-orchestrator.md, and prepare mergeable PRs with live proof and green CI. Before asking Ossian, refresh state and provide a concise decision brief with the full URL, change, proof, risks, recommendation, and exact choices; never ask with only land/delete. Release empty queues with patch by default or minor only for substantial additive features."
